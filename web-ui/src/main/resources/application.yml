server:
  port: 8080

spring:
  application:
    name: web-ui

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5

session:
  base-url: http://localhost:8082
